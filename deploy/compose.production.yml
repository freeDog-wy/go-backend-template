name: go-cms

x-app-defaults: &app-defaults
  env_file:
    - .env
  restart: unless-stopped
  networks:
    - app

x-app-dependencies: &app-dependencies
  postgres:
    condition: service_healthy
  redis:
    condition: service_healthy
  kafka:
    condition: service_healthy

services:
  postgres:
    image: postgres:18.4-alpine3.23
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER is required}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB is required}
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 12
    restart: unless-stopped
    networks:
      - app

  redis:
    image: redis:8.6.4
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
    command: ["redis-server", "--appendonly", "yes", "--requirepass", "${REDIS_PASSWORD:?REDIS_PASSWORD is required}"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli --no-auth-warning -a \"$$REDIS_PASSWORD\" ping | grep -q PONG"]
      interval: 5s
      timeout: 3s
      retries: 12
    restart: unless-stopped
    networks:
      - app

  kafka:
    image: apache/kafka:4.2.1-rc5
    hostname: kafka
    environment:
      KAFKA_CLUSTER_ID: ${KAFKA_CLUSTER_ID:?KAFKA_CLUSTER_ID is required}
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_NUM_PARTITIONS: 3
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_DIRS: /var/lib/kafka/data
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --list >/dev/null 2>&1"]
      interval: 10s
      timeout: 10s
      start_period: 30s
      retries: 12
    restart: unless-stopped
    networks:
      - app

  server:
    <<: *app-defaults
    image: ${REGISTRY:?REGISTRY is required}/${NAMESPACE:?NAMESPACE is required}/${IMAGE_NAME:?IMAGE_NAME is required}-server:${IMAGE_TAG:?IMAGE_TAG is required}
    environment:
      APP_MODE: production
      SERVER_IP: 0.0.0.0
      SERVER_PORT: 8080
    depends_on: *app-dependencies
    ports:
      - "127.0.0.1:8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:8080/readyz"]
      interval: 10s
      timeout: 5s
      start_period: 15s
      retries: 12

  worker:
    <<: *app-defaults
    image: ${REGISTRY:?REGISTRY is required}/${NAMESPACE:?NAMESPACE is required}/${IMAGE_NAME:?IMAGE_NAME is required}-worker:${IMAGE_TAG:?IMAGE_TAG is required}
    environment:
      APP_MODE: production
      WORKER_PROBE_IP: 0.0.0.0
      WORKER_PROBE_PORT: 8081
    depends_on: *app-dependencies
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:8081/readyz"]
      interval: 10s
      timeout: 5s
      start_period: 15s
      retries: 12

  cron:
    <<: *app-defaults
    image: ${REGISTRY:?REGISTRY is required}/${NAMESPACE:?NAMESPACE is required}/${IMAGE_NAME:?IMAGE_NAME is required}-cron:${IMAGE_TAG:?IMAGE_TAG is required}
    environment:
      APP_MODE: production
      CRON_PROBE_IP: 0.0.0.0
      CRON_PROBE_PORT: 8082
    depends_on: *app-dependencies
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:8082/readyz"]
      interval: 10s
      timeout: 5s
      start_period: 15s
      retries: 12

  # This service becomes usable after the release workflow publishes a migrate image.
  migrate:
    <<: *app-defaults
    image: ${REGISTRY:?REGISTRY is required}/${NAMESPACE:?NAMESPACE is required}/${IMAGE_NAME:?IMAGE_NAME is required}-migrate:${IMAGE_TAG:?IMAGE_TAG is required}
    depends_on: *app-dependencies
    profiles: [ops]
    restart: "no"

networks:
  app:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  kafka_data:
